name: 🤖 Auto update ports

on:
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update_packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: Update ports
        run: |
          python ./scripts/update-ports.py 2>&1 | tee /tmp/update-output.txt
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Format vcpkg.json
        run: |
          vcpkg format-manifest --all $(find . -name "vcpkg.json")

          git config --global user.email "updatebot@open-vcpkg"
          git config --global user.name "Update Bot"
          git add ports
          git commit -m "Autoupdating ports" || echo "No port changes to commit"

      - name: Update versions
        run: |
          for dir in ports/* ; do
            vcpkg x-add-version ${dir##ports/} --overlay-ports=./ports \
              --x-builtin-registry-versions-dir=./versions/ \
              --x-builtin-ports-root=./ports
          done

          git add versions
          git commit --am --no-edit || echo "No version changes to commit"

      - name: Create or Update Pull Request
        run: |

          # Fetch existing remote branch
          if git ls-remote --exit-code --heads origin auto-update >/dev/null 2>&1; then
            git fetch origin auto-update:"refs/remotes/origin/auto-update"
          fi

          # Check if there are commits ahead of origin/main
          if git diff --quiet origin/main..HEAD; then
            echo "No changes vs origin/main."
            # If a stale PR branch exists with no diff, nothing to do.
            exit 0
          fi

          # Build summary from update output
          SUMMARY=$(awk '/^={10,}/{found=1; next} found' /tmp/update-output.txt)

          git checkout -B auto-update
          git push --force origin auto-update

          # Check if a PR already exists for this branch
          EXISTING_PR=$(gh pr list --head auto-update --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, updating title and body..."
            gh pr edit "$EXISTING_PR" \
              --title "🚀 Auto-update ports $(date +%Y-%m-%d)" \
              --body "$SUMMARY"
          else
            gh pr create \
              --title "🚀 Auto-update ports $(date +%Y-%m-%d)" \
              --body "$SUMMARY" \
              --base main \
              --head auto-update
          fi
        env:
          GH_TOKEN: ${{ secrets.PAT }}

      - name: Enable Auto-Merge
        continue-on-error: true
        run: |
          PR_NUMBER=$(gh pr list --head auto-update --state open --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr merge --merge --auto "$PR_NUMBER"
          fi
        env:
          GH_TOKEN: ${{ secrets.PAT }}
